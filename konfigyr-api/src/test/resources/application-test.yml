spring:
  cache:
    type: none

  liquibase:
    change-log: classpath:changelog.xml

  mail:
    host: localhost
    port: ${wiremock.server.port:25}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:${wiremock.server.port:8888}
          audiences:
            - konfigyr-api

konfigyr:
  account:
    email-verification:
      algorithm: HS384
      secret: base64:5c2b2b9f31055ff68acb6c3be98699adbbd1a243fa65062ccc6aac4d3888edf1
      expiration: 5m

  audit:
    partitioning-cron: '-'

  crypto:
    master-key:
      value: F95fYHXZgV1SFko-HZJShmF70ys8tXP9LGnW6cX5dmc=
    jdbc:
      initialize-schema: never

  namespace:
    service-catalog:
      build-debounce-period: 10s
      build-timeout: 10s

  scheduler:
    cron-expression: '-'

  vault:
    change-history:
      partitioning-cron: '-'

management:
  otlp:
    metrics:
      export:
        enabled: false

logging:
  level:
    com.konfigyr: DEBUG
    org.jooq.tools.LoggerListener: DEBUG
    org.springframework.security: DEBUG
    org.springframework.test.web.servlet.result: DEBUG
