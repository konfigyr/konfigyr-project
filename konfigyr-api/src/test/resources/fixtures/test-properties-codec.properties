# --- Basic primitives ---
server.port=8080
server.shutdown=graceful
spring.main.banner-mode=off

# --- Boolean and flags ---
feature.login.enabled=true
feature.experimental=false

# --- Numeric types ---
cache.ttl.seconds=300
connection.timeout.ms=1500
rate.limit.per.minute=120.5

# --- Strings and identifiers ---
application.name=konfigyr-vault
application.environment=development
logging.level.root=INFO

# --- URLs and paths ---
spring.datasource.url=jdbc:postgresql://localhost:5432/konfigyr
spring.datasource.username=konfigyr_user
spring.datasource.password=changeMe123!

# --- Lists (string-encoded) ---
allowed.origins=http://localhost:3000,http://127.0.0.1:3000
supported.locales=en,fr,de

# --- Special characters & escaping ---
message.welcome=Hello\ World\!
regex.username=^[a-zA-Z0-9_]{3,16}$
path.temp.dir=/tmp/konfigyr/data
windows.path=C:\\Program\ Files\\Konfigyr

# --- Multiline values (continuation) ---
certificate.public.key=-----BEGIN\ PUBLIC\ KEY-----\
MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEApvF9\
uJdC8f0X1R9KQXbA\
-----END\ PUBLIC\ KEY-----

# --- Secrets (high-sensitivity) ---
api.key.public=pk_live_abcdef123456
api.key.secret=sk_live_987654321abcdef
oauth.client.secret=super-secret-oauth-value

# --- Optional / empty ---
optional.description=
optional.disabled.value=null
