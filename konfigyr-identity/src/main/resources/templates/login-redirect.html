<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}"
      lang="en">
<head>
    <title th:text="#{konfigyr.login.redirect.title}">Redirecting&hellip;</title>
    <meta http-equiv="refresh" th:attr="content='2; url=' + ${target}">
</head>
<body>
    <main layout:fragment="main">
        <div class="container">
            <div class="w-full md:w-1/2 lg:w-1/3 mx-auto text-center">
                <h1 class="text-2xl mb-4">
                    <span class="text-secondary">konfigyr</span>.<small class="font-mono">id</small>
                </h1>

                <div class="rounded-xl border bg-card text-card-foreground shadow-sm p-6 space-y-6">
                    <div class="flex justify-center">
                        <svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://w3.org">
                            <circle cx="30" cy="30" r="0" fill="none" stroke="var(--color-secondary)" stroke-width="2">
                                <animate attributeName="r" from="0" to="30" dur="1.5s" begin="0s" repeatCount="indefinite" />
                                <animate attributeName="opacity" from="1" to="0" dur="1.5s" begin="0s" repeatCount="indefinite" />
                            </circle>
                            <circle cx="30" cy="30" r="8" fill="var(--color-secondary)" />
                        </svg>
                    </div>

                    <div class="flex flex-col space-y-2">
                        <h2 class="font-semibold leading-none tracking-tight" th:text="#{konfigyr.login.redirect.card.title}">
                            You have signed in successfully
                        </h2>
                        <p class="text-sm text-muted-foreground" th:text="#{konfigyr.login.redirect.card.message}">
                            We are redirecting you to the application.
                        </p>
                    </div>

                    <th:block th:replace="~{components/buttons :: outline (label=#{konfigyr.login.redirect.action}, href=${target})}">
                        Click here if you are not redirected automatically.
                    </th:block>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
